name: build

on:
  push:
    branches: [trunk]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            bin: radiosity
          - name: windows-x86_64
            os: windows-latest
            bin: radiosity.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: radiosity-${{ matrix.name }}
          path: target/release/${{ matrix.bin }}
          if-no-files-found: error

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package per-platform archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            (cd "$dir" && zip -r "../${name}.zip" .)
          done
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          fail_on_unmatched_files: true
